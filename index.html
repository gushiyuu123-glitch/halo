<!doctype html>

    />

    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0b0b0a" />

    <meta property="og:locale" content="ja_JP" />
    <meta property="og:title" content="HALO｜いつもの夜が、スクリーンになる。" />

      content="灯りを落とすだけで、部屋がスクリーンになる。夜の空気を壊さない“整う体験”へ。"
